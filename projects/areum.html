<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>마음챙김 가이드 앱 — 양영진</title>
  <link rel="stylesheet" href="../styles.css" />

  <!-- 이유: 폰트 통일 — Wanted Sans Variable (한국어) + DM Sans (영문/숫자) -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/wanteddev/wanted-sans@v1.0.3/packages/wanted-sans/fonts/webfonts/variable/split/WantedSansVariable.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* ── 폰트 일괄 적용 ── */
    .ot-page,
    .ot-page * {
      font-family: "Wanted Sans Variable", "Wanted Sans",
                   "DM Sans", -apple-system, BlinkMacSystemFont,
                   system-ui, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif !important;
      letter-spacing: -0.005em;
    }

    /* ── 인트로 (좌 lede + 우 stack) ── */
    .ot-intro {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 36px;
      align-items: start;
      margin: 8px 0 56px;
      padding-bottom: 22px;
      border-bottom: 1px solid #e5e5e7;
    }
    .ot-intro__lede {
      font-size: 17px; line-height: 1.7;
      color: #424245;
    }
    .ot-intro__lede strong { color: #1d1d1f; font-weight: 600; }
    .ot-intro__lede p { margin: 0 0 14px; }
    .ot-intro__lede p:last-child { margin-bottom: 0; }

    .ot-stack {
      background: #fafafc;
      border: 1px solid #e5e5e7;
      border-radius: 14px;
      padding: 22px 24px;
    }
    .ot-stack__label {
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: #8e8e93;
      margin-bottom: 14px;
    }
    .ot-stack__group { margin-bottom: 14px; }
    .ot-stack__group:last-child { margin-bottom: 0; }
    .ot-stack__group-name {
      font-size: 11px; color: #8e8e93;
      margin-bottom: 6px;
    }
    .ot-stack__items {
      display: flex; flex-wrap: wrap; gap: 4px;
    }
    .ot-stack__item {
      padding: 3px 9px;
      background: #fff;
      border: 1px solid #e5e5e7;
      border-radius: 6px;
      font-size: 12px;
      color: #1d1d1f;
    }

    /* ── 섹션 헤딩 ── */
    .ot-section-title {
      font-size: 20px; font-weight: 600; letter-spacing: -0.012em;
      color: #1d1d1f;
      margin: 56px 0 18px;
    }

    /* ── 화면 그리드 ── */
    .ot-shots {
      display: grid;
      grid-template-columns: 1fr;
      max-width: 420px;
      margin: 0 auto;
    }
    .ot-shot {
      background: #fafafc;
      border: 1px solid #e5e5e7;
      border-radius: 12px;
      overflow: hidden;
    }
    .ot-shot__media {
      aspect-ratio: 1080 / 2340;
      background: #fff;
      display: flex; align-items: stretch; justify-content: center;
      overflow: hidden;
    }
    .ot-shot__media img {
      width: 100%; height: 100%; object-fit: contain; object-position: top;
    }

    @media (max-width: 760px) {
      .ot-intro { grid-template-columns: 1fr; gap: 22px; }
      .ot-shots { max-width: 360px; }
    }
  </style>
  <script>
    const params = new URLSearchParams(location.search);
    if (params.get('embed') === '1') document.documentElement.classList.add('embed');
    if (params.get('preview') === '1') document.documentElement.classList.add('preview');
  </script>
</head>
<body>
  <article class="section project tile-light ot-page">
    <div class="section__inner">

      <!-- 1. 인트로 (좌 lede + 우 stack) -->
      <section class="ot-intro project-hero">
        <div class="project-hero__main">
          <header class="project__head" style="text-align:left;">
            <h1 class="project__title" style="margin-bottom:10px;">마음챙김 가이드 앱</h1>
          </header>

          <div class="ot-intro__lede">
            <p>채팅 상담 앱의 구조를 따르되, 차분한 애니메이션과 <strong>질문 하나만 띄우는 대화 화면</strong>, 입력 부담을 줄이는 가이드 칩으로 사용자가 자극에서 벗어나 자연스럽게 자신의 감정을 표현하도록 설계했습니다.</p>
          </div>
        </div>
        <aside class="ot-stack">
          <div class="ot-stack__label">Stack</div>
          <div class="ot-stack__group">
            <div class="ot-stack__group-name">App</div>
            <div class="ot-stack__items">
              <span class="ot-stack__item">React Native</span>
              <span class="ot-stack__item">Expo</span>
              <span class="ot-stack__item">Reanimated</span>
            </div>
          </div>
          <div class="ot-stack__group">
            <div class="ot-stack__group-name">Backend</div>
            <div class="ot-stack__items">
              <span class="ot-stack__item">Supabase</span>
              <span class="ot-stack__item">Edge Functions</span>
            </div>
          </div>
          <div class="ot-stack__group">
            <div class="ot-stack__group-name">LLM</div>
            <div class="ot-stack__items">
              <span class="ot-stack__item">GPT-4o-mini</span>
              <span class="ot-stack__item">프롬프트 체인</span>
            </div>
          </div>
        </aside>
      </section>

      <!-- 2. 화면 -->
      <h2 class="ot-section-title">화면</h2>

      <div class="ot-shots">
        <div class="ot-shot">
          <div class="ot-shot__media">
            <img src="../assets/projects/areum-chat-empty.jpeg" alt="첫 진입 — 단일 질문 화면" />
          </div>
        </div>
      </div>

    </div>
  </article>
</body>
</html>

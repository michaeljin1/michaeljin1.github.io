<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>양영진 — Forward Deployed Engineer</title>
  <meta name="description" content="양영진 포트폴리오. 비기술적 요구사항을 공학적 문제로 재정의하는 Forward Deployed Engineer 지원자." />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>

  <!-- Hero -->
  <section class="hero" id="top">
    <h1 class="hero__name">양영진</h1>
    <p class="hero__role">Forward Deployed Engineer</p>
    <p class="hero__lede">
      비기술적인 요구사항을 정제하고, 공학적 문제로 재정의해 해결합니다.<br/>
      한 명의 고객의 문제에서 출발해 기획·개발·마케팅까지 직접 수행해 왔습니다.
    </p>
  </section>

  <!-- ============================================================
       Projects — gallery of live iframe previews; click for full page
       ============================================================ -->
  <section class="section tile-light" id="projects">
    <div class="section__inner">
      <header class="section__head">
        <h2 class="section__title">What I did</h2>
      </header>

      <!-- ── 그룹 1 · 창업 ── -->
      <section class="gallery-group">
        <header class="gallery-group__head">
          <div class="gallery-group__label">
            <span class="gallery-group__tag">창업</span>
          </div>
        </header>

        <div class="gallery">
          <button type="button" class="gallery__card" data-modal-src="./projects/areum.html?embed=1" aria-haspopup="dialog">
            <div class="gallery__frame">
              <iframe src="./projects/areum.html?embed=1&preview=1" loading="lazy" tabindex="-1" title="마음챙김 가이드 앱 미리보기"></iframe>
            </div>
            <div class="gallery__body">
              <h3 class="gallery__title">마음챙김 가이드 앱</h3>
              <p class="gallery__desc">자극에서 벗어나, 내면에 다가갈 수 있는 환경. 차분한 인터랙션과 가이드 칩으로 자연스러운 감정 표현을 유도.</p>
              <span class="gallery__open">자세히 보기</span>
            </div>
          </button>

          <button type="button" class="gallery__card" data-modal-src="./projects/yt.html?embed=1" aria-haspopup="dialog">
            <div class="gallery__frame">
              <iframe src="./projects/yt.html?embed=1&preview=1" loading="lazy" tabindex="-1" title="유튜브 분리수거 웹 미리보기"></iframe>
            </div>
            <div class="gallery__body">
              <h3 class="gallery__title">유튜브 분리수거 웹</h3>
              <p class="gallery__desc">재생목록을 한 번에. LLM 청크 요약 + 임베딩 유사도로 영상 간 중복도를 판별해 꼭 봐야 할 영상만 선별.</p>
              <span class="gallery__open">자세히 보기</span>
            </div>
          </button>

          <button type="button" class="gallery__card" data-modal-src="./projects/focus.html?embed=1" aria-haspopup="dialog">
            <div class="gallery__frame">
              <iframe src="./projects/focus.html?embed=1&preview=1" loading="lazy" tabindex="-1" title="작업 품질 트래킹 앱 미리보기"></iframe>
            </div>
            <div class="gallery__body">
              <h3 class="gallery__title">작업 품질 트래킹 앱</h3>
              <p class="gallery__desc">PC 사용 신호로 몰입을 측정. ActivityWatch + 세션 평가로 작업 습관과 품질을 도출.</p>
              <span class="gallery__open">자세히 보기</span>
            </div>
          </button>
        </div>
      </section>

      <!-- ── 그룹 2 · 개발 방식 개선 ── -->
      <section class="gallery-group">
        <header class="gallery-group__head">
          <div class="gallery-group__label">
            <span class="gallery-group__tag">프로젝트</span>
          </div>
        </header>

        <div class="gallery">
          <button type="button" class="gallery__card" data-modal-src="./projects/pheromone.html?embed=1" aria-haspopup="dialog">
            <div class="gallery__frame">
              <iframe src="./projects/pheromone.html?embed=1&preview=1" loading="lazy" tabindex="-1" title="Pheromone Lab 미리보기"></iframe>
            </div>
            <div class="gallery__body">
              <h3 class="gallery__title">Pheromone Lab</h3>
              <p class="gallery__desc">Enhans 페로몬 프로토콜을 Claude Code sub-agent에 적용. Ad-hoc / Relay / Pheromone 3-way 정량 비교로 메인 컨텍스트 5.6배 경량화 검증.</p>
              <span class="gallery__open">자세히 보기</span>
            </div>
          </button>

          <button type="button" class="gallery__card" data-modal-src="./projects/litmus.html?embed=1" aria-haspopup="dialog">
            <div class="gallery__frame">
              <iframe src="./projects/litmus.html?embed=1&preview=1" loading="lazy" tabindex="-1" title="Litmus 미리보기"></iframe>
            </div>
            <div class="gallery__body">
              <h3 class="gallery__title">Litmus</h3>
              <p class="gallery__desc">출시 전 K-뷰티 컨셉 100개를 합성 페르소나 Best/Worst 선택으로 빠르게 좁히는 스크리닝 엔진.</p>
              <span class="gallery__open">자세히 보기</span>
            </div>
          </button>
        </div>
      </section>
    </div>
  </section>


  <!-- ============================================================
       Project popup — one shared <dialog>, src swapped per click
       ============================================================ -->
  <dialog class="modal-iframe" id="proj-dialog" aria-label="프로젝트 상세">
    <button class="modal-iframe__close" data-close aria-label="뒤로가기">
      <span class="modal-iframe__back-icon" aria-hidden="true"></span>
    </button>
    <iframe id="proj-dialog-iframe" src="about:blank" title="프로젝트 상세"></iframe>
  </dialog>

  <script>
    const dlg = document.getElementById('proj-dialog');
    const dlgFrame = document.getElementById('proj-dialog-iframe');
    let savedScrollY = 0;

    document.querySelectorAll('[data-modal-src]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        savedScrollY = window.scrollY;
        dlgFrame.src = btn.dataset.modalSrc;
        dlg.showModal();
        document.documentElement.style.scrollBehavior = 'auto';
        window.scrollTo(0, savedScrollY);
        document.body.style.overflow = 'hidden';
      });
    });

    document.querySelectorAll('[data-close]').forEach(btn => {
      btn.addEventListener('click', () => btn.closest('dialog')?.close());
    });

    dlg.addEventListener('click', (e) => {
      const r = dlg.getBoundingClientRect();
      const inside = e.clientX >= r.left && e.clientX <= r.right
                  && e.clientY >= r.top  && e.clientY <= r.bottom;
      if (!inside) dlg.close();
    });

    dlg.addEventListener('close', () => {
      dlgFrame.src = 'about:blank';
      document.body.style.overflow = '';
      window.scrollTo(0, savedScrollY);
      requestAnimationFrame(() => {
        document.documentElement.style.scrollBehavior = '';
      });
    });
  </script>


</body>
</html>
